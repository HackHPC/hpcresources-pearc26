  <!-- ============ TAB A: RESOURCE DIRECTORY ============ -->
  <section id="tab-directory" class="tab-panel">

    <!-- Multi-resource selection -->
    <div class="flex justify-end items-center gap-2 mb-3">
      <button type="button" id="clear-selected-btn" disabled
        class="inline-flex items-center gap-1.5 bg-white border border-slate-300 hover:border-pearc-orange hover:text-pearc-orange-dark text-slate-500 font-semibold text-sm px-4 py-2.5 rounded-lg shadow-sm transition disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:border-slate-300 disabled:hover:text-slate-500">
        ✕ Clear All Selected
      </button>
      <button type="button" id="share-multiple-btn" disabled
        class="inline-flex items-center gap-2 bg-white border border-slate-300 hover:border-pearc-blue hover:text-pearc-blue-dark text-slate-500 font-semibold text-sm px-4 py-2.5 rounded-lg shadow-sm transition disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:border-slate-300 disabled:hover:text-slate-500">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 shrink-0" aria-hidden="true"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Share Multiple Resources
        <span id="share-multiple-count" class="inline-flex items-center justify-center min-w-[1.25rem] h-5 px-1.5 rounded-full bg-pearc-orange text-white text-xs font-bold">0</span>
      </button>
    </div>

    <!-- Search + Major/Category filters -->
    <div class="flex flex-col sm:flex-row gap-3 mb-5">
      <div class="relative flex-1">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m1.35-5.15a7.5 7.5 0 11-15 0 7.5 7.5 0 0115 0z" />
        </svg>
        <input id="search-input" type="text" placeholder="Search resources by title, category, or description…"
          class="w-full bg-white border border-slate-300 focus:border-pearc-blue focus:ring-2 focus:ring-pearc-blue/20 rounded-lg pl-11 pr-4 py-3 text-sm text-slate-700 placeholder-slate-400 outline-none transition shadow-sm" />
      </div>
      <div class="sm:w-64 shrink-0 relative">
        <button type="button" data-multiselect-toggle="category"
          class="w-full bg-white border border-slate-300 focus:border-pearc-blue focus:ring-2 focus:ring-pearc-blue/20 rounded-lg px-4 py-3 text-sm text-slate-600 outline-none transition shadow-sm flex items-center justify-between gap-2">
          <span data-multiselect-label="category" class="truncate text-left">Filter by category…</span>
          <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
        <div data-multiselect-panel="category" class="hidden absolute left-0 right-0 z-30 mt-1 max-h-72 overflow-y-auto bg-white border border-slate-200 rounded-lg shadow-lg p-2"></div>
      </div>
      <div class="sm:w-64 shrink-0 relative">
        <button type="button" data-multiselect-toggle="major"
          class="w-full bg-white border border-slate-300 focus:border-pearc-blue focus:ring-2 focus:ring-pearc-blue/20 rounded-lg px-4 py-3 text-sm text-slate-600 outline-none transition shadow-sm flex items-center justify-between gap-2">
          <span data-multiselect-label="major" class="truncate text-left">Filter by major…</span>
          <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
        <div data-multiselect-panel="major" class="hidden absolute left-0 right-0 z-30 mt-1 max-h-72 overflow-y-auto bg-white border border-slate-200 rounded-lg shadow-lg p-2"></div>
      </div>
      <div class="sm:w-56 shrink-0">
        <select id="sort-filter"
          class="w-full bg-white border border-slate-300 focus:border-pearc-blue focus:ring-2 focus:ring-pearc-blue/20 rounded-lg px-4 py-3 text-sm text-slate-600 outline-none transition shadow-sm">
          <option value="name">Sort: Name (A–Z)</option>
          <option value="category">Sort: Category (A–Z)</option>
        </select>
      </div>
    </div>

    <!-- Result count -->
    <p id="results-summary" class="text-xs text-slate-400 mb-4"></p>

    <!-- Card grid -->
    <div id="resource-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>

    <p id="empty-state" class="hidden text-center text-slate-400 py-16">
      No resources match your search. Try a different keyword, category, or major.
    </p>
  </section>
